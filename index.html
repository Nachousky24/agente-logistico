<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agente Logistico IA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#03080d;color:#e2eaf0;height:100vh;display:flex;flex-direction:column}
.header{background:#060d14;border-bottom:1px solid #0a2030;padding:14px 20px;display:flex;align-items:center;gap:12px}
.logo{font-size:18px;font-weight:700;color:#00c9ff}
.tag{font-size:10px;padding:2px 8px;border-radius:20px;background:#00c9ff15;border:1px solid #00c9ff30;color:#00c9ff}
.dot{width:6px;height:6px;border-radius:50%;background:#00ff88;box-shadow:0 0 8px #00ff88;animation:blink 2s infinite;margin-left:auto}
.status{font-size:11px;color:#3a6a7a}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px}
.msg{display:flex;gap:10px;max-width:80%}
.msg.user{flex-direction:row-reverse;align-self:flex-end}
.msg.bot{align-self:flex-start}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.msg.bot .avatar{background:#00c9ff15;border:1px solid #00c9ff30}
.msg.user .avatar{background:#0d2233;border:1px solid #1a3a4a}
.bubble{padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.6;white-space:pre-wrap}
.msg.bot .bubble{background:#060d14;border:1px solid #0a2030;color:#c8dde8}
.msg.user .bubble{background:#0d2233;border:1px solid #1a3a4a;color:#a8c8d8}
.quick{padding:10px 20px;display:flex;gap:8px;overflow-x:auto;border-top:1px solid #0a2030;background:#060d14}
.quick::-webkit-scrollbar{display:none}
.qbtn{white-space:nowrap;font-size:12px;padding:6px 14px;border-radius:20px;border:1px solid #0a2030;background:transparent;color:#4a7a9b;cursor:pointer;font-family:'Inter',sans-serif}
.qbtn:hover{border-color:#00c9ff40;color:#00c9ff}
.input-area{padding:14px 20px;border-top:1px solid #0a2030;background:#060d14;display:flex;gap:10px}
.input{flex:1;background:#08131a;border:1px solid #0a2030;border-radius:24px;padding:10px 18px;color:#e2eaf0;font-size:14px;outline:none;font-family:'Inter',sans-serif}
.input:focus{border-color:#00c9ff40}
.input::placeholder{color:#2a4a5e}
.send{width:40px;height:40px;border-radius:50%;background:#00c9ff;border:none;cursor:pointer;font-size:16px;flex-shrink:0}
.send:hover{background:#00b0e0}
.send:disabled{opacity:.4;cursor:not-allowed}
.typing{display:flex;gap:4px;padding:4px 0;align-items:center}
.typing span{width:7px;height:7px;border-radius:50%;background:#4a7a9b;animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
</style>
</head>
<body>
<div class="header">
  <span class="logo">LogisticaIA</span>
  <span class="tag">AGENTE</span>
  <div class="dot"></div>
  <span class="status" style="margin-left:6px">En linea</span>
</div>
<div class="messages" id="msgs"></div>
<div class="quick">
  <button class="qbtn" onclick="send('Optimiza ruta de 10 entregas en Santiago con 2 vehiculos')">Optimizar ruta</button>
  <button class="qbtn" onclick="send('Audita mi inventario de 300 productos con stock para 5 dias')">Auditar inventario</button>
  <button class="qbtn" onclick="send('Necesito importar mercancia desde China a Chile')">Importacion</button>
  <button class="qbtn" onclick="send('Mi proveedor fallo, tengo stock para 3 dias, plan de contingencia')">Contingencia</button>
  <button class="qbtn" onclick="send('Cuanto stock comprar para diciembre si ventas suben 40 por ciento')">Forecast</button>
</div>
<div class="input-area">
  <input class="input" id="inp" placeholder="Define tu objetivo logistico..." onkeydown="if(event.key==='Enter')enviar()"/>
  <button class="send" id="btn" onclick="enviar()">></button>
</div>
<script>
var KEY="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";
var SYS="Eres un agente experto en logistica. Cuando recibas un objetivo: 1) Analizalo, 2) Descomponlo en pasos ejecutables, 3) Da KPIs y metricas concretas, 4) Termina con proximos pasos. Responde en espanol, se especifico y profesional.";
var historial=[];
function addMsg(rol,txt){
  historial.push({role:rol,content:txt});
  var d=document.getElementById('msgs');
  var div=document.createElement('div');
  div.className='msg '+(rol==='user'?'user':'bot');
  div.innerHTML='<div class="avatar">'+(rol==='user'?'👤':'🤖')+'</div><div class="bubble">'+txt+'</div>';
  d.appendChild(div);
  d.scrollTop=d.scrollHeight;
}
function addTyping(){
  var d=document.getElementById('msgs');
  var div=document.createElement('div');
  div.className='msg bot';div.id='typing';
  div.innerHTML='<div class="avatar">🤖</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  d.appendChild(div);d.scrollTop=d.scrollHeight;
}
async function enviar(txt){
  var inp=document.getElementById('inp');
  var btn=document.getElementById('btn');
  var t=txt||inp.value.trim();
  if(!t)return;
  inp.value='';btn.disabled=true;
  addMsg('user',t);addTyping();
  try{
    var msgs=historial.slice(0,-1).concat([{role:'user',content:t}]);
    var r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':KEY,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYS,messages:msgs})
    });
    var data=await r.json();
    document.getElementById('typing').remove();
    addMsg('assistant',data.content[0].text);
  }catch(e){
    document.getElementById('typing').remove();
    addMsg('assistant','Error de conexion. Intenta de nuevo.');
  }
  btn.disabled=false;
}
addMsg('assistant','Hola! Soy tu Agente Logistico IA. Define un objetivo y lo ejecuto de principio a fin. Usa los botones de abajo o escribe directamente.');
</script>
</body>
</html>
